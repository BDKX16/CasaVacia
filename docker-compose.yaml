version: "3.8"
services:
  nextjs:
    container_name: confi-landing-nextjs
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    env_file:
      - .env
    ports:
      - 3120:3000 # Exponer el puerto 3008 al host
    environment:
      - NODE_ENV=production
      # Importante para que Next.js escuche en todas las interfaces
      - HOSTNAME=0.0.0.0

